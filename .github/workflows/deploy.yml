name: Deploy to masterhost

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Add server to known_hosts
        run: |
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Ensure target directory exists
        run: |
          TARGET_PATH="$(printf '%s' '${{ secrets.DEPLOY_PATH }}' | sed "s/[[:space:]]*\\/[[:space:]]*/\\//g; s/^[[:space:]]*//; s/[[:space:]]*$//")"
          ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -p "${{ secrets.DEPLOY_PORT }}" \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "mkdir -p '$TARGET_PATH'"

      - name: Deploy files with tar over SSH
        run: |
          TARGET_PATH="$(printf '%s' '${{ secrets.DEPLOY_PATH }}' | sed "s/[[:space:]]*\\/[[:space:]]*/\\//g; s/^[[:space:]]*//; s/[[:space:]]*$//")"
          find . -mindepth 1 -maxdepth 1 \
            ! -name ".git" \
            ! -name ".github" \
            ! -name ".vscode" \
            ! -name ".idea" \
            ! -name "*.log" \
            ! -name "*.md" \
            -print0 | tar --null -T - -czf - | ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -p "${{ secrets.DEPLOY_PORT }}" \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "tar -xzf - -C '$TARGET_PATH'"
